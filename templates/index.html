<!DOCTYPE html>
<html>
<head>
    <title>Flask Todo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 shadow-sm rounded" style="max-width: 400px;">
        <h3 class="text-center">我的任务</h3>
        <form action="/" method="POST" class="input-group mb-3">
            <input type="text" name="content" class="form-control" placeholder="要做什么？">
            <button class="btn btn-primary" type="submit">添加</button>
        </form>
        <ul class="list-group">
            {% for task in tasks %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                {{ task.content }}
                <a href="/delete/{{ task.id }}" class="btn btn-sm btn-danger">删除</a>
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
